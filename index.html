<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>유지보수 매니저</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --muted: #667380;
      --line: #d9e1e8;
      --panel: #ffffff;
      --soft: #f4f7fa;
      --navy: #12324a;
      --teal: #0f766e;
      --blue: #2563eb;
      --amber: #d97706;
      --rose: #e11d48;
      --green: #15803d;
      --shadow: 0 12px 28px rgba(22, 34, 45, .09);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #edf4f8 0%, #f7f9fb 42%, #eef3f6 100%);
      color: var(--ink);
      min-height: 100vh;
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: var(--navy);
      color: white;
      min-height: 42px;
      padding: 0 14px;
      font-weight: 700;
    }
    button.secondary { background: #e8eef3; color: var(--ink); }
    button.icon {
      width: 42px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }
    button.icon.tiny {
      width: 32px;
      min-height: 32px;
      border-radius: 7px;
    }
    button.icon.tiny svg {
      width: 16px;
      height: 16px;
    }
    button.good { background: var(--teal); }
    button.warn { background: var(--amber); }
    button.danger { background: var(--rose); }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid rgba(37, 99, 235, .22);
      outline-offset: 2px;
    }
    svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    .app-shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }
    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .brand strong { display: block; font-size: 15px; white-space: nowrap; line-height: 1.25; }
    .brand span { display: block; color: var(--muted); font-size: 11px; white-space: nowrap; line-height: 1.2; }
    .top-actions { margin-left: auto; display: flex; gap: 8px; }
    main {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 16px 92px;
    }
    .view { display: none; }
    .view.active { display: block; }
    .grid {
      display: grid;
      gap: 14px;
    }
    .dashboard-grid {
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr);
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    .panel-title { margin: 0; font-size: 16px; line-height: 1.3; }
    .panel-sub { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
    .panel-body { padding: 14px; }
    .stats {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .environment-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .environment-chip {
      min-width: 0;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .92);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      box-shadow: 0 8px 18px rgba(22, 34, 45, .06);
    }
    .environment-chip svg {
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
      color: var(--teal);
    }
    .environment-chip span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .environment-chip strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stat {
      min-height: 48px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .stat span { color: var(--muted); font-size: 11px; line-height: 1.1; }
    .stat strong { font-size: 17px; line-height: 1; }
    .visit-list { display: grid; gap: 10px; }
    .visit-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: white;
      display: grid;
      gap: 10px;
    }
    .visit-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }
    .visit-top h3 { margin: 0; font-size: 15px; }
    .expired-name { color: var(--rose); }
    .visit-meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .visit-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .solution-tile {
      border: 1px solid #cfe2e2;
      background: #f2fbfa;
      border-radius: 8px;
      padding: 9px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #0f5f58;
      min-width: 0;
    }
    .solution-tile svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }
    .solution-tile span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
    }
    .solution-tile strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
      color: #0f5f58;
      overflow-wrap: anywhere;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 999px;
      background: #eef6f6;
      color: #0f5f58;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .tag.blue { background: #edf4ff; color: #1d4ed8; }
    .tag.amber { background: #fff7ed; color: #b45309; }
    .tag.gray { background: #eef2f5; color: #485563; }
    .empty {
      border: 1px dashed #c3ced7;
      color: var(--muted);
      border-radius: 8px;
      padding: 18px;
      text-align: center;
      background: #fbfcfd;
    }
    .calendar-wrap { user-select: none; touch-action: pan-y; }
    .calendar-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .calendar-title { font-weight: 800; }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: white;
    }
    .day-name, .day-cell {
      min-width: 0;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .day-name:nth-child(7n), .day-cell:nth-child(7n) { border-right: 0; }
    .day-name {
      padding: 8px 4px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      background: #f6f9fb;
      color: var(--muted);
    }
    .day-cell {
      min-height: 94px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: #fff;
    }
    .day-cell.muted { background: #f7f9fb; color: #a0aab4; }
    .day-cell.today { box-shadow: inset 0 0 0 2px var(--teal); }
    .day-cell.drop-target { background: #e8f7f2; box-shadow: inset 0 0 0 2px var(--teal); }
    .day-number { font-size: 12px; font-weight: 800; }
    .event-pill {
      display: block;
      width: 100%;
      border-radius: 6px;
      background: #e9f2ff;
      color: #164995;
      padding: 5px 6px;
      font-size: 11px;
      line-height: 1.28;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      cursor: grab;
      touch-action: none;
    }
    .event-pill.dragging {
      position: relative;
      z-index: 50;
      opacity: .9;
      cursor: grabbing;
      box-shadow: 0 10px 22px rgba(22, 34, 45, .22);
    }
    .event-pill.visit { background: #e8f7f2; color: #0e6655; }
    .event-pill.remote { background: #f3eefc; color: #6d28d9; }
    .event-pill.expired { background: #fff1f2; color: #be123c; }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .search {
      flex: 1 1 260px;
      display: flex;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 0 10px;
      min-height: 44px;
    }
    .search input { border: 0; outline: 0; width: 100%; min-width: 0; background: transparent; }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .org-card {
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 13px;
      display: grid;
      gap: 10px;
    }
    .org-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }
    .org-head-main { min-width: 0; }
    .org-head-actions {
      display: flex;
      gap: 5px;
      flex: 0 0 auto;
    }
    .org-card h3 { margin: 0; font-size: 15px; }
    .org-card p { margin: 3px 0 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .org-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    form { display: grid; gap: 14px; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .field { display: grid; gap: 6px; min-width: 0; }
    label { font-weight: 800; font-size: 12px; color: #263541; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      min-height: 42px;
      padding: 9px 10px;
      color: var(--ink);
    }
    textarea { min-height: 92px; resize: vertical; }
    .full { grid-column: 1 / -1; }
    .contact-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1.2fr 1.4fr auto;
      gap: 8px;
      align-items: end;
    }
    .memo-list { display: grid; gap: 10px; }
    .memo-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 12px;
    }
    .memo-card h3 { margin: 0 0 6px; font-size: 15px; }
    .memo-card p { margin: 0; color: var(--muted); font-size: 13px; white-space: pre-wrap; line-height: 1.5; }
    .issue-list {
      display: grid;
      gap: 10px;
      max-height: min(62vh, 620px);
      overflow: auto;
    }
    .issue-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }
    .issue-card h3 { margin: 0 0 6px; font-size: 14px; }
    .issue-card p { margin: 0; color: var(--muted); font-size: 13px; white-space: pre-wrap; line-height: 1.5; }
    .report-list {
      display: grid;
      gap: 10px;
      max-height: min(62vh, 620px);
      overflow: auto;
    }
    .report-card {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
    }
    .report-card img {
      width: 86px;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 6px;
      background: var(--soft);
    }
    .report-card h3 { margin: 0; font-size: 14px; }
    .report-card p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(18px);
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding: 8px max(8px, env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-right));
      gap: 6px;
    }
    .nav-btn {
      background: transparent;
      color: var(--muted);
      min-height: 54px;
      padding: 4px 2px;
      display: grid;
      place-items: center;
      gap: 2px;
      border-radius: 8px;
      font-size: 11px;
    }
    .nav-btn.active { background: #e9f2f4; color: var(--teal); }
    dialog {
      border: 0;
      border-radius: 10px;
      padding: 0;
      width: min(560px, calc(100vw - 28px));
      box-shadow: 0 30px 70px rgba(10, 20, 30, .28);
    }
    dialog::backdrop { background: rgba(13, 23, 33, .48); }
    .modal-body { padding: 16px; }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      background: #fbfcfd;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 82px;
      transform: translateX(-50%);
      z-index: 60;
      background: #17212b;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

    @media (max-width: 920px) {
      .dashboard-grid, .cards, .settings-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .contact-row { grid-template-columns: 1fr; border: 1px solid var(--line); padding: 10px; border-radius: 8px; }
    }
    @media (max-width: 640px) {
      .topbar { padding: 5px 12px; }
      .brand span { display: none; }
      main { padding: 12px 10px 88px; }
      .form-grid { grid-template-columns: 1fr; }
      .panel-head { align-items: start; }
      .top-actions .secondary { display: none; }
      .calendar-grid { font-size: 12px; }
      .day-cell { min-height: 96px; padding: 4px; }
      .event-pill { font-size: 10px; padding: 5px; }
      .visit-top { flex-direction: column; }
      .environment-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .environment-chip { min-height: 44px; padding: 7px 8px; gap: 6px; }
      .environment-chip svg { width: 17px; height: 17px; }
      .environment-chip span { font-size: 10px; }
      .environment-chip strong { font-size: 12px; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stat { min-height: 44px; }
      .report-card { grid-template-columns: 74px minmax(0, 1fr); }
      .report-card img { width: 74px; }
      button { min-height: 40px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="topbar">
        <div class="brand">
          <div><strong>유지보수 매니저</strong><span>방문, 청구, 담당자, 기술메모 관리</span></div>
        </div>
        <div class="top-actions">
          <button class="secondary" id="exportIcsBtn" title="캘린더 파일 내보내기">ICS</button>
        </div>
      </div>
    </header>

    <main>
      <section class="view active" id="view-dashboard" aria-label="대시보드">
        <div class="environment-strip" aria-label="현장 환경 요약">
          <div class="environment-chip" title="오늘 날씨">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="m17.7 17.7 1.4 1.4"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.3 17.7-1.4 1.4"/><path d="m19.1 4.9-1.4 1.4"/></svg>
            <div><span>날씨</span><strong id="weatherText">맑음 22℃</strong></div>
          </div>
          <div class="environment-chip" title="미세먼지">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 8h12a3 3 0 1 0-3-3"/><path d="M4 14h15a3 3 0 1 1-3 3"/><path d="M3 20h9"/></svg>
            <div><span>미세먼지</span><strong id="dustText">보통</strong></div>
          </div>
          <div class="environment-chip" title="풍량">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 8h13a3 3 0 1 0-3-3"/><path d="M4 13h16"/><path d="M3 18h12a3 3 0 1 1-3 3"/></svg>
            <div><span>풍량</span><strong>3.2m/s</strong></div>
          </div>
        </div>
        <div class="grid stats">
          <div class="stat"><span>오늘 할일</span><strong id="todayCount">0</strong></div>
          <div class="stat"><span>내일 할일</span><strong id="tomorrowCount">0</strong></div>
          <div class="stat"><span>이번 달 청구</span><strong id="billingCount">0</strong></div>
          <div class="stat"><span>등록 기관</span><strong id="orgCount">0</strong></div>
        </div>
        <div class="grid">
          <div class="grid">
            <section class="panel">
              <div class="panel-head">
                <div><h2 class="panel-title">오늘 할일</h2><p class="panel-sub">가나다순 자동 정렬, 연락과 Tmap 바로가기</p></div>
                <span class="tag" id="todayDateTag"></span>
              </div>
              <div class="panel-body"><div class="visit-list" id="todayVisits"></div></div>
            </section>
            <section class="panel">
              <div class="panel-head">
                <div><h2 class="panel-title">내일 할일</h2><p class="panel-sub">다음 방문 준비 목록</p></div>
                <span class="tag blue" id="tomorrowDateTag"></span>
              </div>
              <div class="panel-body"><div class="visit-list" id="tomorrowVisits"></div></div>
            </section>
          </div>
        </div>
      </section>

      <section class="view" id="view-orgs" aria-label="기관 검색 등록">
        <div class="toolbar">
          <div class="search"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input id="orgSearch" placeholder="기관명, 지역명, 솔루션, 담당자 검색"></div>
          <button id="newOrgBtn">기관 등록</button>
        </div>
        <div class="cards" id="orgCards"></div>
      </section>

      <section class="view" id="view-calendar" aria-label="전체 캘린더">
        <section class="panel">
          <div class="panel-head">
            <div><h2 class="panel-title">유지보수 캘린더</h2><p class="panel-sub">구글캘린더에는 ICS 파일 또는 일정 링크로 연동</p></div>
            <button class="secondary" id="googleHelpBtn">구글 연동</button>
          </div>
          <div class="panel-body"><div id="mainCalendar" class="calendar-wrap"></div></div>
        </section>
      </section>

      <section class="view" id="view-memo" aria-label="기술 메모">
        <section class="panel">
          <div class="panel-head">
            <div><h2 class="panel-title">기술정보 메모</h2><p class="panel-sub">장비, 솔루션, 장애처리 이력 검색</p></div>
            <button id="addMemoBtn">메모 추가</button>
          </div>
          <div class="panel-body">
            <div class="toolbar">
              <div class="search"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input id="memoSearch" placeholder="키워드, 기관명, 제품명으로 검색"></div>
            </div>
            <div class="memo-list" id="memoList"></div>
          </div>
        </section>
      </section>

      <section class="view" id="view-settings" aria-label="연동 설정">
        <section class="panel">
          <div class="panel-head">

    function renderCalendar(targetId, compact = false) {

      const cells = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(start);

        const events = state.schedules.filter(schedule => schedule.date === iso);
        const classes = ["day-cell"];

          }).join("")}

      if (Math.abs(dx) + Math.abs(dy) > 8) drag.moved = true;
      if (!drag.moved) return;
      drag.el.style.transform = `translate(${dx}px, ${dy}px)`;

    function openReportDb() {

        const request = indexedDB.open("maintenance_reports", 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains("reports")) {
            const store = db.createObjectStore("reports", { keyPath: "id" });
            store.createIndex("orgId", "orgId", { unique: false });
            store.createIndex("createdAt", "createdAt", { unique: false });

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = () => { img.src = reader.result; };
        reader.onerror = () => reject(reader.error);
        img.onload = () => {
          const maxSide = 1280;
          const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
          const canvas = document.createElement("canvas");
          canvas.width = Math.max(1, Math.round(img.width * scale));
          canvas.height = Math.max(1, Math.round(img.height * scale));
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL("image/jpeg", .68);
          resolve({ dataUrl, width: canvas.width, height: canvas.height, bytes: Math.round((dataUrl.length * 3) / 4) });
        };
        img.onerror = () => reject(new Error("이미지를 불러오지 못했습니다."));
        reader.readAsDataURL(file);
      });
    }
    async function renderReportList(orgId) {
      const org = state.orgs.find(o => o.id === orgId);
      const reports = await getReports(orgId);
      reportTitle.textContent = org ? `${org.name} 레포트 내역` : "레포트 내역";
      reportSub.textContent = reports.length ? `${reports.length}건 저장됨` : "저장된 레포트 사진이 없습니다.";
      reportList.innerHTML = reports.length ? reports.map(r => `<article class="report-card">
        <a href="${r.dataUrl}" target="_blank" title="원본 보기"><img src="${r.dataUrl}" alt="레포트 사진"></a>
        <div>
          <h3>${formatDate(r.visitDate || r.createdAt.slice(0, 10))}</h3>
          <p>${r.width}x${r.height} · 약 ${Math.max(1, Math.round(r.bytes / 1024))}KB</p>
          <div class="visit-actions" style="margin-top:8px">
            <button class="secondary" onclick="downloadReport('${r.id}')">다운로드</button>
            <button class="danger" onclick="deleteReport('${r.id}', '${orgId}')">삭제</button>
          </div>
        </div>
      </article>`).join("") : '<div class="empty">아직 저장된 레포트 사진이 없습니다.</div>';
    }
    window.captureReport = id => {
      state.currentReportOrgId = id;
      reportCameraInput.value = "";
      reportCameraInput.click();
    };
    window.openReports = async id => {
      state.currentReportOrgId = id;
      await renderReportList(id);
      reportDialog.showModal();
    };
    window.downloadReport = async id => {
      const reports = await getReports(state.currentReportOrgId);
      const report = reports.find(r => r.id === id);
      if (!report) return;
      const a = document.createElement("a");
      a.href = report.dataUrl;
      a.download = `maintenance-report-${report.createdAt.slice(0, 10)}.jpg`;
      a.click();
    };
    window.deleteReport = async (id, orgId) => {
      if (!confirm("이 레포트 사진을 삭제할까요?")) return;
      await removeReport(id);
      await renderReportList(orgId);
      toast("레포트 사진을 삭제했습니다.");
    };
    reportCameraInput.onchange = async () => {
      const file = reportCameraInput.files?.[0];
      const org = state.orgs.find(o => o.id === state.currentReportOrgId);
      if (!file || !org) return;
      try {
        toast("사진을 압축하고 있습니다.");
        const compressed = await compressImage(file);
        await saveReport({
          id: uid(),
          orgId: org.id,
          orgName: org.name,
          visitDate: org.nextVisit || todayISO(),
          createdAt: new Date().toISOString(),
          ...compressed
        });
        toast("레포트 사진을 저장했습니다.");
        if (reportDialog.open) await renderReportList(org.id);
      } catch (error) {
        console.warn(error);
        showInfo("사진 저장 실패", "사진을 저장하지 못했습니다. 브라우저 저장공간 권한 또는 남은 용량을 확인해주세요.");
      }
    };
    closeReportDialogBtn.onclick = () => reportDialog.close();
    addReportFromDialogBtn.onclick = () => {
      if (state.currentReportOrgId) captureReport(state.currentReportOrgId);
    };
    function renderIssueList(orgId) {
      const org = state.orgs.find(o => o.id === orgId);
      if (!org) return;
      const issues = [...(org.issues || [])].sort((a, b) => `${b.date} ${b.createdAt}`.localeCompare(`${a.date} ${a.createdAt}`));
      issueTitle.textContent = `${org.name} 특이사항`;
      issueSub.textContent = issues.length ? `${issues.length}건 저장됨` : "저장된 특이사항이 없습니다.";
      issueId.value = "";
      issueDate.value = todayISO();
      issueText.value = "";
      saveIssueBtn.textContent = "저장";
      issueList.innerHTML = issues.length ? issues.map(item => `<article class="issue-card">
        <h3>${formatDate(item.date)}</h3>
        <p>${escapeHTML(item.text)}</p>
        <div class="visit-actions" style="margin-top:8px">
          <button class="secondary" onclick="editIssue('${orgId}', '${item.id}')">수정</button>
          <button class="danger" onclick="deleteIssue('${orgId}', '${item.id}')">삭제</button>
        </div>
      </article>`).join("") : '<div class="empty">아직 저장된 특이사항이 없습니다.</div>';
    }
    window.openIssues = id => {
      state.currentIssueOrgId = id;
      renderIssueList(id);
      issueDialog.showModal();
    };
    window.deleteIssue = (orgId, issueId) => {
      if (!confirm("이 특이사항을 삭제할까요?")) return;
      const org = state.orgs.find(o => o.id === orgId);
      if (!org) return;
      org.issues = (org.issues || []).filter(item => item.id !== issueId);
      save();
      renderIssueList(orgId);
      render();
      toast("특이사항을 삭제했습니다.");
    };
    window.editIssue = (orgId, targetIssueId) => {
      const org = state.orgs.find(o => o.id === orgId);
      const item = org?.issues?.find(issue => issue.id === targetIssueId);
      if (!item) return;
      state.currentIssueOrgId = orgId;
      issueId.value = item.id;
      issueDate.value = item.date;
      issueText.value = item.text;
      saveIssueBtn.textContent = "수정";
      issueText.focus();
    };
    issueForm.onsubmit = e => {
      e.preventDefault();
      const org = state.orgs.find(o => o.id === state.currentIssueOrgId);
      if (!org) return;
      org.issues = org.issues || [];
      const existing = org.issues.find(item => item.id === issueId.value);
      if (existing) {
        existing.date = issueDate.value;
        existing.text = issueText.value.trim();
        existing.updatedAt = new Date().toISOString();
      } else {
        org.issues.unshift({ id: uid(), date: issueDate.value, text: issueText.value.trim(), createdAt: new Date().toISOString() });
      }
      save();
      renderIssueList(org.id);
      render();
      toast(existing ? "특이사항을 수정했습니다." : "특이사항을 추가했습니다.");
    };
    closeIssueDialogBtn.onclick = () => issueDialog.close();
    newOrgBtn.onclick = () => { clearOrgForm(); orgDialogTitle.textContent = "기관 등록"; orgDialog.showModal(); };
    addContactBtn.onclick = () => addContactRow();
    closeOrgDialogBtn.onclick = () => orgDialog.close();
    orgForm.onsubmit = e => {
      e.preventDefault();
      const data = {
        id: orgId.value || uid(), region: region.value.trim(), type: orgType.value, name: orgName.value.trim(),
        contractor: contractor.value.trim(), contractDate: contractDate.value, cycle: cycle.value, method: method.value, startDate: startDate.value, endDate: endDate.value,
        nextVisit: "", billingDay: Number(billingDay.value || 0), solution: solution.value.trim(), address: address.value.trim(),
        note: orgNote.value.trim(), contacts: contactsFromForm(), issues: []
      };
      const index = state.orgs.findIndex(o => o.id === data.id);
      const existingIssues = index >= 0 ? (state.orgs[index].issues || []) : [];
      const existingNextVisit = index >= 0 ? state.orgs[index].nextVisit : "";
      data.issues = existingIssues;
      data.nextVisit = existingNextVisit || startDate.value || todayISO();
      if (index >= 0) state.orgs[index] = data; else state.orgs.push(data);
      save();
      orgDialog.close();
      render();
      toast("기관 정보가 저장되었습니다.");
    };
    window.editOrg = id => {
      const o = state.orgs.find(x => x.id === id);
      if (!o) return;
      clearOrgForm();
      orgDialogTitle.textContent = "기관 수정";
      orgId.value = o.id; region.value = o.region; orgType.value = o.type; orgName.value = o.name; contractor.value = o.contractor || "";
      contractDate.value = o.contractDate || "";
      cycle.value = o.cycle; method.value = o.method; startDate.value = o.startDate; endDate.value = o.endDate;
      billingDay.value = o.billingDay || ""; solution.value = o.solution || ""; address.value = o.address || ""; orgNote.value = o.note || "";
      contactRows.innerHTML = "";
      (o.contacts?.length ? o.contacts : [{}]).forEach(addContactRow);
      orgDialog.showModal();
    };
    window.deleteOrg = id => {
      if (!confirm("이 기관을 삭제할까요?")) return;
      state.orgs = state.orgs.filter(o => o.id !== id);
      save(); render(); toast("삭제되었습니다.");
    };
    window.openCall = id => {
      const o = state.orgs.find(x => x.id === id);
      const c = o?.contacts?.[0] || {};
      callTarget.textContent = `${o?.name || ""} · ${c.name || "담당자 미등록"}`;
      callOptions.innerHTML = "";
      [["일반전화", c.tel], ["휴대전화", c.mobile]].forEach(([label, num]) => {
        const btn = document.createElement("button");
        btn.className = num ? "good" : "secondary";
        btn.textContent = num ? `${label} ${num}` : `${label} 없음`;
        btn.disabled = !num;
        btn.onclick = () => { location.href = "tel:" + num.replace(/[^0-9+]/g, ""); };
        callOptions.appendChild(btn);
      });
      callDialog.showModal();
    };
    closeCallDialogBtn.onclick = () => callDialog.close();
    window.openTmap = id => {
      const o = state.orgs.find(x => x.id === id);
      const dest = encodeURIComponent(o.address || o.region || o.name);
      window.open(`https://apis.openapi.sk.com/tmap/app/routes?name=${encodeURIComponent(o.name)}&lon=&lat=&appKey=${encodeURIComponent(state.settings.tmapKey || "")}&goalname=${dest}`, "_blank");
    };
    function scheduleDetails(schedule) {
      const org = orgForSchedule(schedule);
      if (!org) return "개인 일정";
      return `${org.name}\n${org.region}\n${org.method} / ${org.cycle}\n솔루션: ${org.solution || ""}`;
    }
    function scheduleLocation(schedule) {
      const org = orgForSchedule(schedule);
      return org ? (org.address || org.region) : "";
    }
    function fallbackGoogleEvent(schedule) {
      const text = encodeURIComponent(schedule.title);
      const details = encodeURIComponent(scheduleDetails(schedule));
      const dates = googleScheduleDates(schedule);
      window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${dates}&details=${details}&location=${encodeURIComponent(scheduleLocation(schedule))}`, "_blank");
    }
    async function insertGoogleCalendarEvent(schedule) {
      const calendarId = encodeURIComponent(state.settings.googleCalendarId || "primary");
      const bodyStart = schedule.time ? { dateTime: `${schedule.date}T${schedule.time}:00`, timeZone: "Asia/Seoul" } : { date: schedule.date };
      const bodyEnd = schedule.time ? (() => {
        const end = new Date(`${schedule.date}T${schedule.time}:00`);
        end.setHours(end.getHours() + 1);
        const pad = value => String(value).padStart(2, "0");
        const local = `${end.getFullYear()}-${pad(end.getMonth() + 1)}-${pad(end.getDate())}T${pad(end.getHours())}:${pad(end.getMinutes())}:00`;
        return { dateTime: local, timeZone: "Asia/Seoul" };
      })() : { date: scheduleEndDate(schedule) };
      const body = {
        summary: schedule.title,
        location: scheduleLocation(schedule),
        description: scheduleDetails(schedule),
        start: bodyStart,
        end: bodyEnd
      };
      const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${state.googleAccessToken}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || "Google Calendar API error");
      }
      return response.json();
    }
    window.openGoogleEvent = async id => {
      const schedule = state.schedules.find(item => item.id === id);
      if (!schedule) return;
      if (!state.googleAccessToken) {
        fallbackGoogleEvent(schedule);
        return;
      }
      try {
        await insertGoogleCalendarEvent(schedule);
        toast("구글캘린더에 일정을 등록했습니다.");
      } catch (error) {
        console.warn(error);
        showInfo("구글캘린더 등록 실패", "권한이 만료되었거나 캘린더 ID가 맞지 않습니다. 설정에서 구글 연결을 다시 누른 뒤 시도해주세요.");
      }
    };
    googleHelpBtn.onclick = () => connectGoogleCalendar();
    exportIcsBtn.onclick = () => {
      const ics = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Island Maintenance//KR"].concat(state.schedules.map(schedule => [
        "BEGIN:VEVENT",
        "UID:" + schedule.id,
        "DTSTAMP:" + new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z",
        ...icsDateLines(schedule),
        "SUMMARY:" + escapeICS(schedule.title),
        "LOCATION:" + escapeICS(scheduleLocation(schedule)),
        "DESCRIPTION:" + escapeICS(scheduleDetails(schedule)),
        "END:VEVENT"
      ].join("\r\n"))).concat(["END:VCALENDAR"]).join("\r\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([ics], { type: "text/calendar;charset=utf-8" }));
      a.download = "maintenance-calendar.ics";
      a.click();
      URL.revokeObjectURL(a.href);
    };
    addMemoBtn.onclick = () => { memoForm.reset(); memoId.value = ""; memoDialog.showModal(); };
    closeMemoDialogBtn.onclick = () => memoDialog.close();
    memoForm.onsubmit = e => {
      e.preventDefault();
      const m = { id: memoId.value || uid(), title: memoTitle.value.trim(), tags: memoTags.value.trim(), body: memoBody.value.trim() };
      const index = state.memos.findIndex(x => x.id === m.id);
      if (index >= 0) state.memos[index] = m; else state.memos.unshift(m);
      save(); memoDialog.close(); render(); toast("메모가 저장되었습니다.");
    };
    window.editMemo = id => {
      const m = state.memos.find(x => x.id === id);
      memoId.value = m.id; memoTitle.value = m.title; memoTags.value = m.tags; memoBody.value = m.body;
      memoDialog.showModal();
    };
    window.deleteMemo = id => {
      if (!confirm("이 메모를 삭제할까요?")) return;
      state.memos = state.memos.filter(m => m.id !== id);
      save(); render(); toast("삭제되었습니다.");
    };
    saveSettingsBtn.onclick = () => {
      state.settings = { kakaoWebhook: kakaoWebhook.value.trim(), billingNotice: billingNotice.value, googleClientId: googleClientId.value.trim() || defaultGoogleClientId, googleCalendarId: googleCalendarId.value.trim() || "primary", tmapKey: tmapKey.value.trim() };
      save(); toast("연동 설정이 저장되었습니다.");
    };
    function connectGoogleCalendar() {
      state.settings.googleClientId = googleClientId.value.trim() || defaultGoogleClientId;
      state.settings.googleCalendarId = googleCalendarId.value.trim() || "primary";
      save();
      if (location.protocol === "file:") {
        showInfo("구글 연결은 HTTPS에서 가능", "현재 파일로 직접 열려 있어서 Google OAuth 연결이 차단될 수 있습니다. GitHub Pages 주소에서 열면 구글 연결 버튼이 정상 동작합니다.");
        return;
      }
      if (!window.google?.accounts?.oauth2) {
        showInfo("구글 연결 준비 중", "구글 인증 스크립트를 아직 불러오는 중입니다. 잠시 뒤 다시 눌러주세요.");
        return;
      }
      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: state.settings.googleClientId,
        scope: "https://www.googleapis.com/auth/calendar.events",
        callback: response => {
          if (response.error) {
            showInfo("구글 연결 실패", "Google OAuth Client ID 또는 승인된 JavaScript 원본 설정을 확인해주세요.");
            return;
          }
          state.googleAccessToken = response.access_token;
          toast("구글캘린더 연결이 완료되었습니다.");
        }
      });
      tokenClient.requestAccessToken({ prompt: "consent" });
    }
    connectGoogleBtn.onclick = () => connectGoogleCalendar();
    testKakaoBtn.onclick = () => {
      showInfo("카카오워크 알림", "브라우저 단독 시안에서는 보안상 Webhook 직접 호출 대신 설정 저장까지만 지원합니다. 운영 서버에서 청구일 기준으로 스케줄러를 실행해 카카오워크 Incoming Webhook으로 메시지를 보내면 됩니다.");
    };
    closeInfoDialogBtn.onclick = () => infoDialog.close();
    orgSearch.oninput = renderOrgs;
    memoSearch.oninput = renderMemos;
    function showInfo(title, body) {
      infoTitle.textContent = title;
      infoBody.textContent = body;
      infoDialog.showModal();
    }
    function escapeHTML(str = "") {
      return String(str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
    }
    function escapeAttr(str = "") { return escapeHTML(str); }
    function escapeICS(str = "") { return String(str).replace(/\\/g, "\\\\").replace(/\n/g, "\\n").replace(/,/g, "\\,").replace(/;/g, "\\;"); }
    const savedView = localStorage.getItem("maint_active_view");
    if (savedView && document.getElementById("view-" + savedView)) {
      switchView(savedView);
    } else {
      render();
    }
  </script>
</body>
</html>
